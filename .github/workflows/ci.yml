name: CI

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Check docs sync
        run: npm run check:doc-sync

      - name: Check npm package layout
        run: npm run check:npm-package

  v31-platform-smoke:
    name: v3.1 platform smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run v3.1 smoke
        run: npm run check:v31-smoke

      - name: Upload v3.1 smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v31-smoke-${{ matrix.os }}
          path: test-tmp/v31-smoke/**/v31-smoke-report.json
          if-no-files-found: warn
